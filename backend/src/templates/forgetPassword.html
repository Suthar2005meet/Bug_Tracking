<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .email-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }

        .email-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            background-color: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon-wrap svg {
            width: 28px;
            height: 28px;
            color: #4f46e5;
            stroke: #4f46e5;
        }

        .email-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .email-card p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .reset-btn {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 13px 32px;
            border-radius: 10px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            letter-spacing: 0.3px;
        }

        .reset-btn:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 28px 0 20px;
        }

        .footer-note {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .footer-note span {
            color: #475569;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="email-wrapper">
        <div class="email-card">

            <!-- Icon -->
            <div class="icon-wrap">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>

            <h1>Reset Your Password</h1>
            <p>We received a request to reset your password. Click the button below to choose a new one. This link will expire in <span style="color: #4f46e5; font-weight: 600;">30 minutes</span>.</p>

            <a href="http://localhost:5173/resetpassword/${token}" class="reset-btn">
                Reset Password
            </a>

            <hr class="divider">

            <p class="footer-note">
                If you didn't request a password reset, you can safely ignore this email.<br>
                <span>Your password will not be changed.</span>
            </p>

        </div>
    </div>

</body>
</html>
